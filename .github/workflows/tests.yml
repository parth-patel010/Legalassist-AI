
name: Python Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Generate Test Data
      run: |
        python scripts/generate_test_data.py
    - name: Run Tests
      run: |
        # We dummy mock secrets for streamlit import
        mkdir -p .streamlit
        echo 'OPENROUTER_API_KEY = "dummy"' > .streamlit/secrets.toml
        echo 'OPENROUTER_BASE_URL = "dummy"' >> .streamlit/secrets.toml
        pytest test_app.py
