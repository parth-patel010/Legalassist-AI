
name: Tests & Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-cov coverage[toml]
    
    - name: Setup Streamlit secrets for testing
      run: |
        mkdir -p .streamlit
        echo 'OPENROUTER_API_KEY = "test_key"' > .streamlit/secrets.toml
        echo 'OPENROUTER_BASE_URL = "https://openrouter.ai/api/v1"' >> .streamlit/secrets.toml
    
    - name: Lint with flake8
      run: |
        pip install flake8
        flake8 core/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 core/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true
    
    - name: Run all tests
      run: |
        python -m pytest tests/ -v --tb=short
    
    - name: Generate coverage report
      run: |
        python -m pytest tests/ \
          --cov=core \
          --cov=database \
          --cov=notification_service \
          --cov=scheduler \
          --cov-report=html \
          --cov-report=term-missing \
          --cov-report=xml \
          --cov-fail-under=70
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-${{ matrix.python-version }}
        fail_ci_if_error: false
    
    - name: Archive coverage reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: htmlcov/
        retention-days: 30

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    
    - name: Install security tools
      run: |
        pip install bandit safety
    
    - name: Run Bandit security scan
      run: |
        bandit -r core/ database.py notification_service.py scheduler.py -f json -o bandit-report.json || true
    
    - name: Check dependencies with Safety
      run: |
        pip install -r requirements.txt
        safety check --json || true
