version: '3.8'

services:
  streamlit:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app:cached
    command: bash -c "pip install -r requirements.txt && streamlit run app.py --server.port=8501 --server.address=0.0.0.0"
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_ENABLE_CORS=false
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/legalassist
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: legalassist
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  db_data:
